<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .container {
        width: 90%;
        min-height: 100px;
        border: 1px solid lightgray;
        margin: auto;
      }
      .gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .gallery img {
        width: calc(100% / 6 - 10px);
        height: 180px;
        object-fit: fill;
        border-radius: 10px;
        transition: all 0.3s linear;
      }
      .gallery img:hover {
        transform: scale(1.05);
      }

      /* media query */
      @media only screen and (max-width: 768px) {
        .gallery img {
          width: calc(100% / 4 - 10px);
        }
      }
      @media only screen and (max-width: 600px) {
        .gallery img {
          width: 100%;
          height: auto;
          margin-bottom: 5px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="gallery">
        <img src="./imgs/comp1.jpeg" />
        <img src="./imgs/comp2.jpeg" />
        <img src="./imgs/comp3.jpg" />
        <img src="./imgs/e3.jpg" />
        <img src="./imgs/e4.jpg" />
        <img src="./imgs/comp1.jpeg" />

        <img src="./imgs/comp2.jpeg" />
        <img src="./imgs/comp3.jpg" />
        <img src="./imgs/e3.jpg" />
        <img src="./imgs/e4.jpg" />
        <img src="./imgs/e3.jpg" />
        <img src="./imgs/e4.jpg" />
      </div>
    </div>
  </body>
</html>
