<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .container {
        width: 80%;
        min-height: 100px;
        border: 1px solid lightgray;
        margin: auto;
        display: flex;
        flex-direction: column;
      }
      .header-menu {
        width: 100%;
        height: 60px;
        display: flex;
        flex-direction: row;
        background-color: black;
      }
      .header-menu .logo {
        flex-basis: 40%;
      }
      .logo h1 {
        padding: 5px;
        color: orangered;
        font-size: 40px;
      }
      .header-menu .menu {
        flex-basis: 59%;
        display: flex;
        align-items: center;
        justify-content: end;
      }
      .menu ul {
        list-style-type: none;
        display: flex;
        gap: 20px;
      }
      .menu ul li a {
        color: white;
        text-decoration: none;
        padding: 10px;
        font-size: 18px;
      }
      .menu ul li a:hover {
        background-color: orangered;
        color: white;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-menu">
        <div class="logo">
          <h1>ByteCode</h1>
        </div>
        <div class="menu">
          <ul>
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Services</a></li>
            <li><a href="">Products</a></li>
            <li><a href="">Contact</a></li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
