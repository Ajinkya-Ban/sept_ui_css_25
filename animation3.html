<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .container {
        width: 80%;
        min-height: 100px;
        border: 1px solid #000;
        margin: auto;
      }
      .main-box {
        width: 100%;
        height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background-color: black;
      }
      .main-box .message {
        display: flex;
        flex-basis: 70%;
      }
      .message p {
        padding: 10px;
        font-size: 2.1em;
        color: white;
        text-align: center;
      }
      .photo {
        display: flex;
        flex-basis: 30%;
        animation-name: moveImg;
        animation-duration: 3s;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
      }
      .photo img {
        width: 100%;
        padding: 10px;
      }

      @keyframes moveImg {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-30px);
        }
        100% {
          transform: translateY(0);
        }
      }

      @media only screen and (max-width: 768px) {
        .main-box {
          flex-direction: column;
          min-height: 800px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="main-box">
        <div class="message">
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Aspernatur
            ipsam repudiandae saepe asperiores dolores voluptas molestiae facere
            iure dolor ea tempora error dolorem, inventore ullam distinctio
            pariatur unde nam dignissimos.
          </p>
        </div>
        <div class="photo">
          <img src="./imgs/e4.jpg" />
        </div>
      </div>
    </div>
  </body>
</html>
